spring:
  application:
    name: cart-service # 服务名称
  profiles:
    active: dev
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:192.168.100.129:8848} # nacos地址
      discovery:  #注册中心
        namespace: ${NACOS_NAMESPACE:d9b78b50-4b3d-4c7e-bed0-1dd1d090f23d}  #命名空间
      config:   #配置中心
        file-extension: yaml # 文件后缀名
        namespace: ${NACOS_NAMESPACE:d9b78b50-4b3d-4c7e-bed0-1dd1d090f23d}  #命名空间
        group: ${GROUP_NAME:DEFAULT_GROUP}    # 配置分组
        shared-configs: # 共享配置
          - dataId: shared-jdbc.yaml # 共享mybatis配置
          - dataId: shared-log.yaml # 共享日志配置
          - dataId: shared-swagger.yaml # 共享日志配置
          - dataId: shared-feign.yaml # 共享feign配置
          - dataId: shared-seata.yaml # 共享seata配置
          - dataId: shared-sentinel.yaml # 共享sentinel配置